<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable</title>
    <style>
        table {
            width: 50%;
            border-collapse: collapse;
            text-align: center;
            border: 3px solid black;
        }
        th{
            border: 2px solid rgb(23, 7, 240);
            background-color: rgb(115, 255, 0);

        }
      td {
            border: 2px solid black;
            padding: 10px;
            background-color: aquamarine;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <th colspan="7">Time Table</th>
        </tr>
        <tr><td colspan="2" rowspan="6">Hours</td>
            <th>Mon</th>
            <th>Tue</th>
            <th>Wed</th>
            <th>Thu</th>
            <th>Fri</th>
        </tr>
        <tr>
            
            <td>Science</td>
            <td>Maths</td>
            <td>Science</td>
            <td>Maths</td>
            <td>Arts</td>
        </tr>
        <tr>
            <td>Social</td>
            <td>History</td>
            <td>English</td>
            <td>Social</td>
            <td>Sports</td>
        </tr>
        <tr>
            <td colspan="5", ><b>LUNCH</b></td>
        </tr>
        <tr>
          
            <td>Science</td>
            <td>Maths</td>
            <td>Science</td>
            <td>Maths</td>
            <td rowspan = " 2"><b>Project</b></td>
        </tr>
        <tr>
            <td>Social</td>
            <td>History</td>
            <td>English</td>
            <td>Social</td>
        </tr>
    </table>

</body>
</html>
